services:
  encuentro_gui:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.encuentrocafe.com}
    container_name: encuentro_gui
    restart: unless-stopped
    ports:
      - "3011:3009"
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nodev,nosuid
      - /var/tmp:noexec,nodev,nosuid
    read_only: true
    volumes:
      - encuentro_next_cache:/app/.next/cache

volumes:
  encuentro_next_cache:
